version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: toolrent-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: toolrent
    ports:
      - "5433:5432"
    restart: always

  backend-1:
    image: toolrent-backend
    container_name: toolrent-backend-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/toolrent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:9090/realms/toolrent-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCE: sisgr-frontend
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      - db

  backend-2:
    image: toolrent-backend
    container_name: toolrent-backend-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/toolrent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:9090/realms/toolrent-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCE: sisgr-frontend
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      - db

  backend-3:
    image: toolrent-backend
    container_name: toolrent-backend-3
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/toolrent
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:9090/realms/toolrent-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCE: sisgr-frontend
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      - db

  frontend:
    image: toolrent-frontend
    container_name: toolrent-frontend

  nginx-lb:
    image: nginx:alpine
    container_name: toolrent-nginx-lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend-1
      - backend-2
      - backend-3
      - frontend
